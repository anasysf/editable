<!doctype html>
<html>
  <head lang="en">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"
      integrity="sha512-b2QcS5SsA8tZodcDtGRELiGv5SaKSk1vDHDaQRda0htPYWZ6046lr3kJ5bAAQdpV2mmA/4v0wQF9MyU6/pDIAg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <title>EDITABLE EXAMPLE DEV</title>
  </head>

  <body class="container-fluid mt-4">
    <table id="data-table" class="table table-striped" style="width: 100%">
      <colgroup>
        <col data-options='{ "field": "firstName" }' />
        <col data-options='{ "field": "lastName" }' />
        <col data-options='{ "field": "email", "editor": { "type": "email" } }' />
        <col
          data-options='{ "field": "height", "type": "money-3", "editor": { "type": "money-3" } }'
        />
        <col data-options='{ "field": "edit" }' />
        <col data-options='{ "field": "delete" }' />
      </colgroup>
      <thead>
        <tr>
          <th scope="col">First Name</th>
          <th scope="col">Last Name</th>
          <th scope="col">Email</th>
          <th scope="col">Height</th>
          <th scope="col"></th>
          <th scope="col"></th>
        </tr>
      </thead>
    </table>
    <button id="add-row" class="btn btn-primary">ADD ROW</button>

    <script src="../dist/dev-jquery/editable.bundle.js"></script>

    <script defer>
      $(function () {
        const editable = $('#data-table').editable({
          rowId: 'id',
          dataSrc: {
            src: 'https://dummyjson.com/users',
            method: 'GET',
            prop: 'users',
          },
          updateDataSrc: {
            src: 'https://dummyjson.com/users/1',
            method: 'PUT',
          },
          deleteDataSrc: {
            src: 'https://dummyjson.com/users/1',
            method: 'DELETE',
          },
          postDataSrc: 'https://dummyjson.com/users/add',
        });

        $('#add-row').click(() => editable.addRow());

        editable
          .on('inputInvalid', ({ message, table, tr, row, element, value }) => {
            console.error(message, table, tr, row, element, value);
          })
          .on('inputValid', ({ table, tr, row, element, value }) => {
            console.info(table, tr, row, element, value);
          })
          .on('httpError', ({ status, statusText, url }) => {
            console.error(status, statusText, url);
          })
          .on('error', ({ message }) => {
            console.error(message);
          })
          .on('afterUpdate', ({ table, tr, row, rowData, oldRowData }) => {
            console.info(table, tr, row, rowData, oldRowData);
          })
          .on('beforeCancel', ({ table, tr, row, rowData }) => {
            console.info(table, tr, row, rowData);
          })
          .on('afterCancel', ({ table, tr, row, rowData }) => {
            console.info(table, tr, row, rowData);
          });
      });
    </script>
  </body>
</html>
