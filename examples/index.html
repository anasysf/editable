<!doctype html>
<html>
  <head lang="en">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"
      integrity="sha512-b2QcS5SsA8tZodcDtGRELiGv5SaKSk1vDHDaQRda0htPYWZ6046lr3kJ5bAAQdpV2mmA/4v0wQF9MyU6/pDIAg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <table class="table table-striped table-hover" id="data-table" style="width: 100%">
      <colgroup>
        <col data-options='{ "field": "firstName" }' />
        <col data-options='{ "field": "lastName" }' />
        <col data-options='{ "field": "email", "editor": { "type": "email" } }' />
        <col data-options='{ "field": "edit" }' />
        <col data-options='{ "field": "delete" }' />
      </colgroup>
      <thead>
        <tr>
          <th scope="col">First Name</th>
          <th scope="col">Last Name</th>
          <th scope="col">Email</th>
          <th scope="col"></th>
          <th scope="col"></th>
        </tr>
      </thead>
    </table>
    <button id="add-row" class="btn btn-primary">ADD ROW</button>

    <!-- <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
      integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
  ></script> -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.min.js"
      integrity="sha512-WW8/jxkELe2CAiE4LvQfwm1rajOS8PHasCCx+knHG0gBHt8EXxS6T6tJRTGuDQVnluuAvMxWF4j8SNFDKceLFg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script src="../dist/dev/editable.bundle.js"></script>

    <script>
      $(function () {
        const editable = $('#data-table').editable({
          rowId: 'id',
          dataSrc: {
            src: 'https://dummyjson.com/users',
            method: 'GET',
            prop: 'users',
          },
          updateDataSrc: {
            src: 'https://dummyjson.com/users/1',
            method: 'PUT',
          },
          deleteDataSrc: {
            src: 'https://dummyjson.com/users/1',
            method: 'DELETE',
          },
          postDataSrc: 'https://dummyjson.com/users/add',
          onInputInvalid: function (table, tr, row, el, value, message) {
            console.log(table, tr, row, el, value, message);
          },
        });

        $('#add-row').click(() => editable.addRow());
      });
    </script>
  </body>
</html>
